<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falali Hair Salon - Chat Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 650px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
            }
            30% {
                opacity: 1;
            }
        }

        .booking-form {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .form-submit:active {
            opacity: 0.9;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
            background: white;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .chat-send-btn:active {
            transform: scale(0.95);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Falali Hair Salon</h1>
            <p>Chat with us 24/7</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-bubble">
                    Hey! 👋 Welcome to Falali Hair Salon. Ask me about services, pricing, hours, booking, or policies. What can I help with?
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="Ask about booking, services, hours..."
                autocomplete="off"
            >
            <button class="chat-send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // Falali Knowledge Base
        const knowledgeBase = {
            booking: {
                patterns: ['book', 'appointment', 'schedule', 'reserve', 'how do i book'],
                response: `📅 Book Your Appointment`,
                showForm: true
            },
            services: {
                patterns: ['service', 'haircut', 'color', 'perm', 'treatment', 'styling', 'what do you offer'],
                response: `We offer:\n💇 HAIRCUTS: $35-$69\n🎨 COLOR & TREATMENTS\n💆 STYLING & MASSAGE\n\nCall (206) 483-4666 for pricing details!`
            },
            hours: {
                patterns: ['hours', 'open', 'close', 'when are you open', 'time'],
                response: `🕐 FALALI HOURS:\n\nMonday - Sunday\n11:00 AM - 8:30 PM\n\n📍 623 S King St, Seattle, WA 98104\n📞 (206) 483-4666`
            },
            location: {
                patterns: ['location', 'address', 'where', 'directions', 'find us'],
                response: `📍 FIND US:\n\n623 S King St\nSeattle, WA 98104\n\n📞 (206) 483-4666\n📧 ted0206233@icloud.com`
            },
            parking: {
                patterns: ['park', 'parking', 'where to park'],
                response: `🅿️ PARKING:\n\n1. 6th & King (2 min walk)\n2. 616 6th Ave (4 min walk)\n3. Uwajimaya (5 min walk)\n4. Interim Parking (6 min walk)\n\nAll nearby!`
            },
            pricing: {
                patterns: ['price', 'cost', 'how much', 'expensive', 'rates'],
                response: `💰 PRICING:\n\n💇 Haircuts: $35-$69\n🎨 Color/Perms: Price varies\n💆 Massage: $40-$50\n\nPrices depend on hair length & complexity. Call for exact quote!`
            },
            policy: {
                patterns: ['policy', 'policies', 'cancellation', 'no-show', 'refund'],
                response: `📋 KEY POLICIES:\n\n❌ No-show fee: $20\n⏱️ Cancel 2hrs before\n✅ Free corrections within 7 days\n⚠️ Disclose allergies before service\n\nCall (206) 483-4666 for more!`
            },
            staff: {
                patterns: ['staff', 'stylist', 'who works', 'team'],
                response: `💇 Our Team:\n• Olivia\n• Eva\n• Plus talented professionals\n\nBook to request your preferred stylist!`
            }
        };

        function addMessage(text, isBot = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isBot ? 'bot' : 'user'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addTyping() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typing-indicator';
            
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            messageDiv.appendChild(typing);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function showBookingForm() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = `
                <div class="booking-form">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="bookName" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="tel" id="bookPhone" placeholder="(206) 555-1234" required>
                    </div>
                    <div class="form-group">
                        <label>Service *</label>
                        <select id="bookService" required>
                            <option value="">Select service</option>
                            <option value="Haircut">Haircut</option>
                            <option value="Color">Color</option>
                            <option value="Perm">Perm</option>
                            <option value="Treatment">Treatment</option>
                            <option value="Styling">Styling</option>
                            <option value="Massage">Massage</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Preferred Time</label>
                        <input type="text" id="bookTime" placeholder="e.g., Saturday 2pm">
                    </div>
                    <button class="form-submit" onclick="submitBooking()">Request Appointment</button>
                </div>
            `;
            
            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function submitBooking() {
            const name = document.getElementById('bookName').value.trim();
            const phone = document.getElementById('bookPhone').value.trim();
            const service = document.getElementById('bookService').value;
            const time = document.getElementById('bookTime').value.trim() || 'Any time';

            if (!name || !phone || !service) {
                alert('Please fill in Name, Phone, and Service');
                return;
            }

            addMessage(`${name} | ${phone} | ${service} | ${time}`, false);
            
            addTyping();
            setTimeout(() => {
                removeTyping();
                addMessage(`✅ Got it ${name}! We'll call you at ${phone} to confirm your ${service} appointment.\n\nOur hours: Mon-Sun 11am-8:30pm\n\nCall us anytime: (206) 483-4666`, true);
                sendBtn.disabled = false;
                chatInput.focus();
            }, 800);
        }

        async function getAIResponse(userMessage) {
            // Check knowledge base
            for (const [key, item] of Object.entries(knowledgeBase)) {
                for (const pattern of item.patterns) {
                    if (userMessage.toLowerCase().includes(pattern)) {
                        if (item.showForm) {
                            setTimeout(showBookingForm, 400);
                        }
                        return item.response;
                    }
                }
            }

            // Fallback
            return `Great question! For specific details, call us at (206) 483-4666 or visit 623 S King St. We're open 11am-8:30pm daily! 😊`;
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            addMessage(message, false);
            chatInput.value = '';
            sendBtn.disabled = true;

            addTyping();
            
            const response = await getAIResponse(message);
            removeTyping();
            
            setTimeout(() => {
                addMessage(response, true);
                sendBtn.disabled = false;
                chatInput.focus();
            }, 400);
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        chatInput.focus();
    </script>
</body>
</html>
