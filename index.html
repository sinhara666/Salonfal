<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falali Hair Salon - Chat Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 650px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
            }
            30% {
                opacity: 1;
            }
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
            background: white;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .chat-send-btn:hover {
            transform: scale(1.05);
        }

        .chat-send-btn:active {
            transform: scale(0.95);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .quick-reply {
            background: white;
            border: 1px solid #667eea;
            color: #667eea;
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply:hover {
            background: #667eea;
            color: white;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Falali Hair Salon</h1>
            <p>We're here to help! Ask us anything</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-bubble">
                    Hey! 👋 Welcome to Falali Hair Salon. I'm here to answer your questions about our services, pricing, hours, booking, and policies. What can I help you with today?
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="Ask about services, booking, hours..."
                autocomplete="off"
            >
            <button class="chat-send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // Falali Hair Salon Knowledge Base
        const knowledgeBase = {
            greeting: {
                patterns: ['hi', 'hello', 'hey', 'start', 'help'],
                response: "Hey! 👋 I'm the Falali Hair Salon assistant. I can help with:\n• Services & pricing\n• Booking appointments\n• Hours & location\n• Policies & FAQs\n• Parking options\n\nWhat would you like to know?"
            },
            services: {
                patterns: ['service', 'haircut', 'color', 'perm', 'treatment', 'styling', 'what do you offer', 'what services'],
                response: `We offer a wide range of services:\n\n💇 HAIRCUTS:\n• Men's Haircut + Shampoo: $35+\n• Women's Short/Long/Extra Long: $39-$69\n• Senior's Haircut: $15+\n\n🎨 COLOR & TREATMENTS:\n• Root Touch-Up, Full Color\n• Protein Treatment\n• Hair Perm (Korean, Down, Digital Ceramic)\n• Japanese Straightening\n\n💆 STYLING & MASSAGE:\n• Shampoo + Styling: $30-$39\n• Head Massage: $40-$50\n\nPrices vary based on hair length, density & complexity. Ask about specific services!`
            },
            booking: {
                patterns: ['book', 'appointment', 'schedule', 'reserve', 'how do i book', 'when can i come'],
                response: `📅 BOOKING WITH US:\n\nYou can schedule an appointment:\n• Online on our website\n• By phone: (206) 483-4666\n• Text message\n• WeChat\n• Directly at our salon\n\n⏰ Our Hours:\nMonday - Sunday: 11:00 AM - 8:30 PM\n\nWalk-ins welcome, but we recommend booking in advance for your preferred time & stylist!`
            },
            hours: {
                patterns: ['hours', 'open', 'close', 'when are you open', 'operating hours', 'time'],
                response: `🕐 FALALI HOURS:\n\nMonday - Sunday\n11:00 AM - 8:30 PM\n\nWe're open 7 days a week!\n\n📍 Location:\n623 S King St\nSeattle, WA 98104\n\nPhone: (206) 483-4666`
            },
            location: {
                patterns: ['location', 'address', 'where', 'directions', 'find us', 'how to get there'],
                response: `📍 FIND US:\n\nFalali Hair Salon\n623 S King St\nSeattle, Washington 98104\n\n📞 (206) 483-4666\n📧 ted0206233@icloud.com\n\n🅿️ PARKING OPTIONS:\n1. 6th & King St (2 min walk)\n2. 616 6th Ave (4 min walk)\n3. Uwajimaya (5 min walk)\n4. Interim Parking (6 min walk)\n\nGoogle Maps: Just search "Falali Hair Salon Seattle"`
            },
            parking: {
                patterns: ['park', 'parking', 'where to park', 'parking nearby'],
                response: `🅿️ PARKING NEAR FALALI:\n\nOption 1: 6th & King St\n• Distance: 400 ft (2 min walk)\n• Phone: (206) 254-0811\n\nOption 2: 616 6th Ave\n• Distance: 900 ft (4 min walk)\n• Phone: (206) 284-6303\n\nOption 3: Uwajimaya\n• Distance: 1100 ft (5 min walk)\n• Phone: (206) 254-0811\n\nOption 4: Interim Parking (900 S King)\n• Distance: 1200 ft (6 min walk)\n• Phone: (206) 624-1802\n\nAll within easy walking distance!`
            },
            pricing: {
                patterns: ['price', 'cost', 'how much', 'expensive', 'rates'],
                response: `💰 PRICING:\n\nPrices reflect CASH discount. Card/Apple Pay/Google Pay adds 3% fee.\n\n💇 HAIRCUTS:\n• Men's: $35+ (30 mins)\n• Women's Short: $39 (45 mins)\n• Women's Long: $49-$69 (45 mins-1 hr)\n• Senior's: $15+ (15 mins)\n\n🎨 SPECIALTY SERVICES:\n• Perms: $35-$80+ (varies by type)\n• Color: Prices vary (consult needed)\n• Treatments: Price varies\n\n💆 OTHER:\n• Head Massage: $40-$50\n• Consultation: Free (10 mins)\n\nNote: Our stylists examine your hair & provide accurate quotes before starting. Prices vary based on hair length, density & complexity.`
            },
            policy: {
                patterns: ['policy', 'policies', 'cancellation', 'no-show', 'refund', 'rules'],
                response: `📋 OUR POLICIES:\n\n❌ NO-SHOW FEE: $20\n• Mark appointment as no-show if not cancelled/rescheduled 2 hours before\n• Fee added to your account, must be paid at next visit\n\n⏱️ CANCELLATION:\n• Need 2 hours notice minimum\n• Cancellations within 2 hours may incur fees\n• We'll offer your slot to other clients\n\n✅ CORRECTIONS:\n• Free corrections within 7 days if technical issue\n• Does NOT cover preference changes (different color/style)\n\n🔄 REFUNDS:\n• No refunds after service completed\n• Inform stylist immediately if unsatisfied\n• We'll work on technical fixes free of charge\n\n⚠️ ALLERGIES:\n• Disclose ALL allergies before service\n• Patch test available 48 hours before chemical services\n• Not responsible for undisclosed allergies\n\nQuestions? Ask us!`
            },
            allergies: {
                patterns: ['allergy', 'allergic', 'sensitive', 'reaction', 'patch test', 'chemical'],
                response: `⚠️ ALLERGY & HEALTH INFO:\n\nIMPORTANT:\n• Tell us about ANY allergies BEFORE service\n• Allergies to: dyes, bleach, perm solutions, keratin, fragrances, sulfates, silicones, etc.\n\n🧪 PATCH TEST:\n• Available for chemical services (color, perm, straightening, keratin)\n• Book 48 hours BEFORE your appointment\n• Takes 15 mins\n\n⚕️ FOR YOUR SAFETY:\n• We follow strict sanitation protocols\n• Tools disinfected after every client\n• Professional products used\n• If symptoms occur: notify stylist immediately\n\n❗ DISCLAIMER:\n• Even haircut-only services can cause reactions (shampoo, products, tools)\n• If you don't disclose allergies & have a reaction, we're not responsible\n• Bring own products if needed\n\nYour safety is our priority!`
            },
            staff: {
                patterns: ['staff', 'stylist', 'who works', 'team', 'stylists'],
                response: `💇 OUR TALENTED TEAM:\n\nWe have experienced stylists ready to help:\n• Olivia\n• Eva\n• Plus more talented professionals\n\nEach stylist specializes in different services. Book in advance to request your preferred stylist!\n\nCall: (206) 483-4666 to ask about specific stylists.`
            },
            chemical: {
                patterns: ['chemical', 'japanese straightening', 'korean perm', 'bleach', 'safety'],
                response: `🧪 CHEMICAL SERVICES - SAFETY INFO:\n\nJAPANESE STRAIGHTENING:\n• Only on non-severely damaged hair\n• Not on heavily bleached/permed hair\n\nKOREAN PERMS:\n• 3-6 month durability\n• Professional service (3+ hours)\n\nKERATIN/BRAZILIAN:\n• Applied with proper ventilation\n• Professional products only\n• Safety Data Sheet (SDS) available\n\n⚕️ BEFORE CHEMICAL SERVICE:\n1. Disclose all allergies & sensitivities\n2. Complete consent form\n3. Patch test recommended (48 hrs prior)\n4. Stylist examines hair condition\n\nAny concerns? Ask before we start!`
            },
            children: {
                patterns: ['children', 'kids', 'child', 'baby', 'parent'],
                response: `👨‍👧 CHILDREN POLICY:\n\n✅ WELCOME:\n• Children can visit if they stay seated & quiet\n• Helps maintain relaxing environment\n\n⚠️ MINORS & CHEMICAL SERVICES:\n• Under 18 needs parent/guardian present\n• Parent must consent to chemical services (color, perm, bleach, straightening, keratin)\n• May require signed consent forms\n• We reserve right to refuse if unsafe for age/hair condition\n\nIf bringing a child, let us know in advance!`
            },
            default: {
                patterns: ['.*'],
                response: null
            }
        };

        // AI Response with Groq (fallback to knowledge base)
        async function getAIResponse(userMessage) {
            // First, check knowledge base for instant responses
            for (const [key, item] of Object.entries(knowledgeBase)) {
                if (key === 'default') continue;
                for (const pattern of item.patterns) {
                    if (userMessage.toLowerCase().includes(pattern)) {
                        return item.response;
                    }
                }
            }

            // If no pattern match, use Groq for intelligent response
            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-6",
                        max_tokens: 300,
                        system: `You are a friendly, professional customer service chatbot for Falali Hair Salon in Seattle, WA. 
                        
Your role is to:
- Answer questions about hair services, pricing, hours, location, booking
- Be helpful and professional
- Keep responses concise (2-3 sentences max)
- If you don't know something, suggest they call (206) 483-4666
- Always be warm and welcoming

FALALI FACTS:
- Located: 623 S King St, Seattle, WA 98104
- Hours: Mon-Sun 11am-8:30pm
- Phone: (206) 483-4666
- Services: Haircuts, color, perms, treatments, styling, massage
- Prices: $15-$69+ depending on service`,
                        messages: [
                            { role: "user", content: userMessage }
                        ]
                    })
                });

                const data = await response.json();
                if (data.content && data.content[0]) {
                    return data.content[0].text;
                }
            } catch (error) {
                console.log('Using fallback response');
            }

            // Fallback response
            return `Great question! For specific details, please call us at (206) 483-4666 or visit us at 623 S King St, Seattle. Our team is happy to help! 😊`;
        }

        function addMessage(text, isBot = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isBot ? 'bot' : 'user'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addTyping() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typing-indicator';
            
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            messageDiv.appendChild(typing);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            addMessage(message, false);
            chatInput.value = '';
            sendBtn.disabled = true;

            addTyping();
            
            const response = await getAIResponse(message);
            removeTyping();
            
            setTimeout(() => {
                addMessage(response, true);
                sendBtn.disabled = false;
                chatInput.focus();
            }, 500);
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        chatInput.focus();
    </script>
</body>
</html>
